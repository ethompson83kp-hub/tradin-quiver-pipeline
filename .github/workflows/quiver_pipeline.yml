name: Quiver Research Pipeline

on:
  schedule:
    - cron: '45 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-quiver-research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-auth google-auth-httplib2 google-api-python-client

      - name: Run Quiver research pipeline
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python quiver_research.py

      - name: Commit signals to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add quiver_signals.json open_positions.json
          git commit -m "Update signals $(date -u +%Y-%m-%d)" || echo "No changes"
          git push --force

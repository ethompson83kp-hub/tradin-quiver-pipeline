name: Quiver Research Pipeline

on:
  schedule:
    - cron: '45 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-quiver-research:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Quiver research pipeline
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
        run: python quiver_research.py

      - name: Commit signals to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add quiver_signals.json
          git commit -m "Update quiver_signals.json $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
